name: Enterprise ERP CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-backend:
    name: Build & Verify Spring Boot Backend (TDD Gate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: university_erp_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: backend/pom.xml

      - name: Run Maven Verification & Unit Tests
        run: |
          cd backend
          mvn clean verify -DDB_URL=jdbc:postgresql://localhost:5432/university_erp_db -DDB_USERNAME=postgres -DDB_PASSWORD=postgrespassword -DDDL_AUTO=create-drop

  build-frontend:
    name: Lint & Build React Vite Frontend (Quality Gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint & Production Build
        run: |
          cd frontend
          npm run lint && npm run build
