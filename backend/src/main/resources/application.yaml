spring:
  application:
    name: university-erp-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/university_erp_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  cache:
    type: redis

jwt:
  secret: ${JWT_SECRET:9a4f2c8d7e1b5a3f6c9d2e8a4b7c1e5f8a3d6b9c2e7f1a4b8c3d6e9f2a5b8c1e}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:80,http://localhost}
